name: capstone_app_three
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- Firebase core + plugins (no analytics) ---
  # Versions chosen from a compatible set for Flutter >=3.3, Dart >=3.2
  # to avoid the weird breakage hit with newer analytics builds.
  firebase_core: 3.6.0
  firebase_auth: 5.3.1
  cloud_firestore: 5.4.4
  firebase_messaging: 15.1.3
  intl: ^0.18.1
  fl_chart: ^0.69.0



  # Local notifications (version chosen to work with older Flutter
  # than the latest 19.x which requires Flutter >=3.22)
  flutter_local_notifications: ^19.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1


flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"          
  image: assets/icon.png    
  android: true
  ios: false
  android_12:
    color: "#FFFFFF"
    image: assets/icon.png


